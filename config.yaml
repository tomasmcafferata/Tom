# ============================================================
# EMAIL RESPONSE AGGREGATOR - CONFIGURATION
# ============================================================
# Fill in your details below. See setup_guide.md for help.
# ============================================================

# --- API Keys ---
instantly_api_key: ${INSTANTLY_API_KEY}
anthropic_api_key: ${ANTHROPIC_API_KEY}

# --- Slack ---
# See setup_guide.md Step 2 for how to get these.
# Actual tokens are stored in .env file (not committed to git).
slack:
  bot_token: ${SLACK_BOT_TOKEN}
  app_token: ${SLACK_APP_TOKEN}
  channel_id: ${SLACK_CHANNEL_ID}

# --- Google Sheets CRM ---
# The ID from your Google Sheet URL:
# https://docs.google.com/spreadsheets/d/THIS_PART_IS_THE_ID/edit
google_sheet_id: ${GOOGLE_SHEET_ID}
# Path to your Google service account credentials JSON
google_credentials_path: "credentials/service_account.json"

# --- Polling ---
# How often to check for new replies (in seconds)
poll_interval_seconds: 300  # 5 minutes

# --- Microsoft (only if you have Microsoft/Outlook inboxes) ---
# microsoft:
#   client_id: "YOUR_AZURE_CLIENT_ID"
#   tenant_id: "YOUR_AZURE_TENANT_ID"
#   client_secret: "YOUR_AZURE_CLIENT_SECRET"

